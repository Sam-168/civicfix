<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — CivicFix AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--ink:#0a0a0a;--paper:#f5f2eb;--accent:#e8440a;--muted:#6b6860;--card:#fff;--border:#ddd9d0;--sidebar:#0d0d0d;--sidebar-text:#aaa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;padding:28px 0;position:fixed;top:0;left:0;bottom:0}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;padding:0 24px 32px;border-bottom:1px solid #222}
.sidebar-logo span{color:var(--accent)}
.sidebar-nav{flex:1;padding:20px 0}
.nav-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#555;padding:0 24px 10px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;font-weight:500;color:var(--sidebar-text);text-decoration:none}
.nav-item:hover,.nav-item.active{color:#fff;background:#1a1a1a;border-left:2px solid var(--accent)}
.sidebar-bottom{padding:20px 24px;border-top:1px solid #222}
.btn-logout{display:block;padding:12px 16px;border-radius:8px;background:#fff;color:#111;text-align:center;text-decoration:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:18px 36px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.topbar-right{font-size:14px;color:var(--muted)}
.content{padding:36px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card,.panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px}
.stat-card-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.stat-card-value{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;line-height:1}
.stat-card-sub{font-size:12px;color:var(--muted);margin-top:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-container{position:relative;height:260px}
.panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px}
.hotspot,.rec{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;background:#faf7f0}
.hotspot strong,.rec strong{display:block;margin-bottom:6px}
.hotspot p,.rec p{color:var(--muted);font-size:14px;line-height:1.6}
.badge{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.b-critical{background:#fde8e2;color:#c0320a}
.b-high{background:#fef3e2;color:#b05f00}
.b-medium{background:#fefce2;color:#8a7000}
.b-low{background:#e8f5ee;color:#1e6640}
@media (max-width:1100px){.stats-row,.grid-2{grid-template-columns:1fr 1fr}}
@media (max-width:860px){body{display:block}.sidebar{position:relative;width:100%}.main{margin-left:0}.content{padding:20px}.stats-row,.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">Civic<span>Fix</span> AI</div>
    <nav class="sidebar-nav">
      <span class="nav-label">Admin</span>
      <a class="nav-item active" href="/dashboard">Dashboard</a>
      <a class="nav-item" href="/incidents">Incidents</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/logout" class="btn-logout">Logout</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Dashboard Overview</div>
      <div class="topbar-right">{{ user.email }}</div>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-label">Total incidents</div>
          <div class="stat-card-value" id="s-total">—</div>
          <div class="stat-card-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Open issues</div>
          <div class="stat-card-value" id="s-open">—</div>
          <div class="stat-card-sub">Requiring action</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">High/Critical</div>
          <div class="stat-card-value" id="s-high">—</div>
          <div class="stat-card-sub">Priority incidents</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Resolved today</div>
          <div class="stat-card-value" id="s-resolved">—</div>
          <div class="stat-card-sub">Completed</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="panel">
          <div class="panel-title">Issues by category</div>
          <div class="chart-container"><canvas id="cat-chart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">Status breakdown</div>
          <div class="chart-container"><canvas id="status-chart"></canvas></div>
        </div>
      </div>

      <div class="grid-2">
        <div class="panel">
          <div class="panel-title">Chronic Hotspots</div>
          <div id="hotspots-list"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Recommended Actions</div>
          <div id="recommendations-list"></div>
        </div>
      </div>
    </div>
  </div>

<script>
let catChart, statusChart;

function prioClass(p) {
  return {'Critical':'b-critical','High':'b-high','Medium':'b-medium','Low':'b-low'}[p] || 'b-low';
}

async function loadDashboard() {
  const [statsRes, hotspotsRes, recsRes] = await Promise.all([
    fetch('/api/stats'),
    fetch('/api/chronic-hotspots'),
    fetch('/api/action-recommendations')
  ]);

  const stats = await statsRes.json();
  const hotspots = await hotspotsRes.json();
  const recs = await recsRes.json();

  document.getElementById('s-total').textContent = stats.total ?? '—';
  document.getElementById('s-open').textContent = stats.open ?? '—';
  document.getElementById('s-high').textContent = stats.high_priority ?? '—';
  document.getElementById('s-resolved').textContent = stats.resolved_today ?? '—';

  renderCharts(stats);
  renderHotspots(hotspots);
  renderRecommendations(recs);
}

function renderCharts(stats) {
  const cats = stats.by_category || {};
  const statuses = stats.by_status || {};

  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('cat-chart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(cats),
      datasets: [{
        data: Object.values(cats),
        backgroundColor: ['#1a5fa8','#e8440a','#e07b00','#2d7a4f','#c9a800','#7b2fa8'],
        borderWidth: 0
      }]
    },
    options: { plugins: { legend: { position: 'right' } }, cutout: '65%' }
  });

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('status-chart'), {
    type: 'doughnut',
    data: {
      labels: ['Submitted','Pending','Resolved'],
      datasets: [{
        data: [
          statuses['Submitted'] || 0,
          statuses['Pending'] || 0,
          statuses['Resolved'] || 0
        ],
        backgroundColor: ['#2d7a4f','#e07b00','#888'],
        borderWidth: 0
      }]
    },
    options: { plugins: { legend: { position: 'right' } }, cutout: '65%' }
  });
}

function renderHotspots(items) {
  const el = document.getElementById('hotspots-list');
  if (!items.length) {
    el.innerHTML = '<p style="color:#6b6860">No chronic hotspots flagged yet.</p>';
    return;
  }

  el.innerHTML = items.map(h => `
    <div class="hotspot">
      <strong>${h.issue_type} in ${h.ward}</strong>
      <p>${h.incident_count} open incidents, ${h.total_reports} total reports</p>
      <p>Examples: ${(h.sample_addresses || []).join(', ')}</p>
      <span class="badge ${prioClass(h.max_priority)}">${h.max_priority}</span>
    </div>
  `).join('');
}

function renderRecommendations(items) {
  const el = document.getElementById('recommendations-list');
  if (!items.length) {
    el.innerHTML = '<p style="color:#6b6860">No recommendations yet.</p>';
    return;
  }

  el.innerHTML = items.map(r => `
    <div class="rec">
      <strong>${r.title}</strong>
      <p>${r.reason}</p>
      <span class="badge ${prioClass(r.priority)}">${r.priority}</span>
    </div>
  `).join('');
}

loadDashboard();
</script>
</body>
</html>

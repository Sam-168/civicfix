<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report Fault — CivicFix AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a0a;--paper:#f5f2eb;--card:#fff;--border:#ddd9d0;--accent:#e8440a;--muted:#6b6860;--sidebar:#0d0d0d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);color:#fff;padding:28px 0;display:flex;flex-direction:column}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;padding:0 24px 28px;border-bottom:1px solid #222}
.logo span{color:var(--accent)}
.nav{padding:20px 0;display:flex;flex-direction:column;gap:4px}
.nav a{color:#bbb;text-decoration:none;padding:12px 24px;font-size:15px;font-weight:500}
.nav a.active,.nav a:hover{background:#1b1b1b;color:#fff}
.bottom{margin-top:auto;padding:20px 24px;border-top:1px solid #222}
.logout{display:block;text-align:center;padding:12px 14px;border-radius:10px;background:#fff;color:#111;text-decoration:none;font-weight:700}
.main{flex:1;padding:36px}
.wrap{max-width:920px}
.tag{display:inline-block;padding:8px 14px;border-radius:999px;background:#edf6ef;color:#2d7a4f;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
h1{font-family:'Syne',sans-serif;font-size:48px;line-height:.95;letter-spacing:-2px;margin:18px 0 14px}
.sub{color:var(--muted);font-size:17px;line-height:1.7;max-width:700px;margin-bottom:24px}
.form-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:24px}
label{display:block;margin:14px 0 8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#555}
textarea,input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:#faf7f0;font-family:'DM Sans',sans-serif;font-size:15px}
textarea{min-height:140px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 220px;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 20px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer}
.btn:hover{background:#cf3c08}
.secondary{background:#111}
.secondary:hover{background:#222}
.loc-box,.result,.preview{margin-top:16px;padding:16px;border:1px solid var(--border);border-radius:16px;background:#faf7f0}
.result{display:none;background:#eef7f0}
.result.show{display:block}
.preview{display:none}
.preview img{max-width:100%;max-height:280px;border-radius:12px;display:block}
.result strong{display:block;margin-bottom:8px;font-family:'Syne',sans-serif}
.meta{font-size:14px;color:var(--muted);line-height:1.7}
.error{margin-top:14px;padding:12px 14px;border-radius:12px;background:#fde8e2;color:#b73306;font-size:14px;display:none}
@media (max-width:860px){body{display:block}.sidebar{width:100%}.main{padding:20px}h1{font-size:36px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">Civic<span>Fix</span> AI</div>
    <nav class="nav">
      <a href="/home">Home</a>
      <a href="/report" class="active">Report a Fault</a>
      <a href="/my-reports">My Reports</a>
    </nav>
    <div class="bottom">
      <a class="logout" href="/logout">Logout</a>
    </div>
  </aside>

  <main class="main">
    <div class="wrap">
      <div class="tag">Citizen Reporting</div>
      <h1>Report an issue</h1>
      <p class="sub">
        Describe the problem, detect your location, upload a photo if available, and submit the issue for municipal action.
      </p>

      <div class="form-card">
        <label for="description">Describe the problem</label>
        <textarea id="description" placeholder="Example: Burst pipe flooding the road near the primary school on Main Street. Water has been flowing for about 2 hours."></textarea>

        <label for="address">Location</label>
        <div class="row">
          <input id="address" type="text" placeholder="Address will appear here after detection..." readonly>
          <button class="btn secondary" type="button" onclick="detectLocation()">Detect</button>
        </div>

        <div class="loc-box">
          <div class="meta">
            <strong style="display:block;margin-bottom:8px;color:#111">Live location</strong>
            <div id="loc-text">Location not detected yet.</div>
          </div>
        </div>

        <label for="photo">Photo (optional)</label>
        <input id="photo" type="file" accept="image/*" capture="environment" onchange="previewImage(this)">

        <div id="preview-wrap" class="preview">
          <div class="meta" style="margin-bottom:10px"><strong style="color:#111">Image preview</strong></div>
          <img id="preview-img" src="" alt="Preview">
        </div>

        <div id="error" class="error"></div>

        <div style="margin-top:18px">
          <button class="btn" type="button" onclick="submitReport()">Submit Report</button>
        </div>

        <div id="result" class="result">
          <strong>Report submitted</strong>
          <div class="meta" id="result-text"></div>
        </div>
      </div>
    </div>
  </main>

<script>
let currentLat = null;
let currentLon = null;
let uploadedImageBase64 = null;

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError() {
  const el = document.getElementById('error');
  el.textContent = '';
  el.style.display = 'none';
}

function detectLocation() {
  clearError();

  if (!navigator.geolocation) {
    showError('Geolocation is not supported on this browser.');
    return;
  }

  document.getElementById('loc-text').textContent = 'Detecting location...';

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      document.getElementById('loc-text').textContent = `Lat ${currentLat.toFixed(5)} | Lon ${currentLon.toFixed(5)}`;

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${currentLat}&lon=${currentLon}`);
        const data = await res.json();
        document.getElementById('address').value = data.display_name || 'Address detected';
      } catch {
        document.getElementById('address').value = 'Address unavailable';
      }
    },
    () => {
      showError('Could not detect your location. Please allow location access.');
      document.getElementById('loc-text').textContent = 'Location not detected.';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function previewImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImageBase64 = e.target.result;
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function submitReport() {
  clearError();

  const description = document.getElementById('description').value.trim();
  const address = document.getElementById('address').value.trim() || 'Unknown location';

  if (!description) {
    showError('Please describe the problem.');
    return;
  }

  if (currentLat === null || currentLon === null) {
    showError('Please detect your location before submitting.');
    return;
  }

  const payload = {
    description,
    lat: currentLat,
    lon: currentLon,
    address,
    ward: 'Unknown',
    image_base64: uploadedImageBase64
  };

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Failed to submit report.');
      return;
    }

    const result = document.getElementById('result');
    const resultText = document.getElementById('result-text');

    resultText.innerHTML = `
      <div><b>Report ID:</b> ${data.report_id}</div>
      <div><b>Issue type:</b> ${data.issue_type}</div>
      <div><b>Department:</b> ${data.department}</div>
      <div><b>Priority:</b> ${data.priority}</div>
      <div><b>Status:</b> ${data.status}</div>
      <div><b>AI source:</b> ${data.ai_source}</div>
      <div><b>Message:</b> ${data.reason}</div>
    `;
    result.classList.add('show');

    document.getElementById('description').value = '';
  } catch {
    showError('Something went wrong while submitting the report.');
  }
}
</script>
</body>
</html>
